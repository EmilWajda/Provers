name: loft

services:
  core:
    image: loft-core:latest
    build: ./core
    container_name: loft-core
    volumes:
      - ./workspaces:/loft/workspaces
    use_api_socket: true
  spass:
    image: loft-prover-spass:latest
    build: ./provers/spass
    container_name: loft-prover-spass
    volumes:
      - ./workspaces:/loft/workspaces
    profiles: ["tools"]
  vampire:
    image: loft-prover-vampire:latest
    build: ./provers/vampire
    container_name: loft-prover-vampire
    volumes:
      - ./workspaces:/loft/workspaces
    profiles: ["tools"]
